<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Datos de Envío</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --azul:#1a3a5c;--azul2:#2563a8;--amarillo:#f5c842;--amarillo2:#e8b800;
  --bg:#f4f6fa;--blanco:#fff;--borde:#dde3ee;--texto:#1a2236;
  --muted:#6b7a99;--verde:#16a34a;--radio:10px;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--texto);min-height:100vh}

header{background:var(--azul);padding:18px 24px;display:flex;align-items:center;gap:14px}
.logo{width:40px;height:40px;background:var(--amarillo);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:var(--azul);flex-shrink:0}
header h1{color:#fff;font-size:17px;font-weight:600}
header p{color:rgba(255,255,255,.6);font-size:12px;margin-top:2px}

.container{max-width:560px;margin:0 auto;padding:24px 16px 60px}

/* PROGRESS */
.progress{display:flex;align-items:center;gap:0;margin-bottom:28px}
.step-dot{width:28px;height:28px;border-radius:50%;border:2px solid var(--borde);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--muted);background:var(--blanco);flex-shrink:0;transition:.2s}
.step-dot.active{border-color:var(--azul2);color:var(--azul2)}
.step-dot.done{background:var(--verde);border-color:var(--verde);color:#fff}
.step-line{flex:1;height:2px;background:var(--borde);transition:.3s}
.step-line.done{background:var(--verde)}

/* CARDS */
.card{background:var(--blanco);border:1.5px solid var(--borde);border-radius:14px;padding:22px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:18px}

/* TIPO ENVIO */
.tipo-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tipo-btn{border:2px solid var(--borde);border-radius:12px;padding:20px 14px;cursor:pointer;background:var(--blanco);text-align:center;transition:.15s;display:flex;flex-direction:column;align-items:center;gap:10px}
.tipo-btn:hover{border-color:var(--azul2);background:#f0f5ff}
.tipo-btn.selected{border-color:var(--azul2);background:#f0f5ff}
.tipo-btn.selected .tipo-check{display:flex}
.tipo-icon{font-size:32px;line-height:1}
.tipo-label{font-size:15px;font-weight:600;color:var(--texto)}
.tipo-desc{font-size:12px;color:var(--muted);line-height:1.4}
.tipo-check{width:20px;height:20px;border-radius:50%;background:var(--azul2);display:none;align-items:center;justify-content:center;font-size:11px;color:#fff;margin-top:4px}

/* FORM */
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
label{display:block;font-size:13px;font-weight:500;color:var(--texto);margin-bottom:5px}
.req{color:var(--azul2)}
input,select{width:100%;height:44px;padding:0 14px;border:1.5px solid var(--borde);border-radius:var(--radio);font-family:'DM Sans',sans-serif;font-size:15px;color:var(--texto);background:var(--blanco);appearance:none;outline:none;transition:.15s}
input:focus,select:focus{border-color:var(--azul2);box-shadow:0 0 0 3px rgba(37,99,168,.1)}
select:disabled{background:#f0f2f7;color:var(--muted);cursor:not-allowed}
.select-wrap{position:relative}
.select-wrap::after{content:'▾';position:absolute;right:13px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* SUCURSAL INFO */
.suc-info{background:#f0f5ff;border:1.5px solid #c8d6e8;border-radius:var(--radio);padding:14px 16px;margin-top:14px;display:none}
.suc-info.visible{display:block}
.suc-row{display:flex;gap:8px;font-size:13px;margin-bottom:6px;align-items:flex-start}
.suc-row:last-child{margin-bottom:0}
.suc-lbl{color:var(--muted);min-width:70px;font-weight:500;flex-shrink:0}
.suc-val{color:var(--azul);font-weight:500;line-height:1.4}

/* BTN */
.btn{width:100%;height:50px;background:var(--amarillo);color:var(--azul);border:none;border-radius:var(--radio);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:.15s;margin-top:8px}
.btn:hover{background:var(--amarillo2)}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* HIDDEN */
.hidden{display:none}

/* SUCCESS */
.success{background:var(--blanco);border:1.5px solid #86efac;border-radius:14px;padding:32px 24px;text-align:center;display:none}
.success.visible{display:block}
.suc-icon{width:56px;height:56px;background:var(--verde);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:26px;color:#fff}
.success h2{font-size:20px;font-weight:600;color:#15803d;margin-bottom:8px}
.success p{font-size:14px;color:#166534;line-height:1.6}
.success .detalle{background:#f0fdf4;border-radius:10px;padding:14px;margin-top:16px;text-align:left;font-size:13px;color:#166534;line-height:2}
.success .detalle strong{color:#15803d}

@media(max-width:480px){
  .tipo-grid{grid-template-columns:1fr}
  .row2{grid-template-columns:1fr}
  .card{padding:18px 14px}
}
</style>
</head>
<body>

<header>
  <div class="logo">CA</div>
  <div>
    <h1>Datos de envío</h1>
    <p>Completá los datos para coordinar tu pedido</p>
  </div>
</header>

<div class="container">

  <div class="progress">
    <div class="step-dot active" id="sd1">1</div>
    <div class="step-line" id="sl1"></div>
    <div class="step-dot" id="sd2">2</div>
    <div class="step-line" id="sl2"></div>
    <div class="step-dot" id="sd3">3</div>
  </div>

  <form id="form" novalidate>

    <!-- PASO 1: TIPO DE ENVIO -->
    <div class="card" id="bloqueTipo">
      <div class="card-title">¿Cómo querés recibir tu pedido?</div>
      <div class="tipo-grid">
        <button type="button" class="tipo-btn" id="btnDomicilio" onclick="elegirTipo('domicilio')">
          <span class="tipo-icon">🏠</span>
          <span class="tipo-label">Envío a domicilio</span>
          <span class="tipo-desc">Lo recibís en tu casa</span>
          <span class="tipo-check">✓</span>
        </button>
        <button type="button" class="tipo-btn" id="btnSucursal" onclick="elegirTipo('sucursal')">
          <span class="tipo-icon">🏪</span>
          <span class="tipo-label">Retiro en sucursal</span>
          <span class="tipo-desc">Correo Argentino</span>
          <span class="tipo-check">✓</span>
        </button>
      </div>
    </div>

    <!-- PASO 2: DATOS PERSONALES -->
    <div class="card hidden" id="bloqueDatos">
      <div class="card-title">Tus datos</div>
      <div class="field">
        <label>Nombre completo <span class="req">*</span></label>
        <input type="text" id="nombre" placeholder="Ej: Juan Pérez" required>
      </div>
      <div class="row2">
        <div class="field">
          <label>Email <span class="req">*</span></label>
          <input type="email" id="email" placeholder="tu@email.com" required>
        </div>
        <div class="field">
          <label>Teléfono <span class="req">*</span></label>
          <input type="tel" id="telefono" placeholder="11 2345-6789" required>
        </div>
      </div>
    </div>

    <!-- PASO 3A: DOMICILIO -->
    <div class="card hidden" id="bloqueDomicilio">
      <div class="card-title">Dirección de entrega</div>
      <div class="field">
        <label>Calle y número <span class="req">*</span></label>
        <input type="text" id="calle" placeholder="Ej: San Martín 1234">
      </div>
      <div class="row2">
        <div class="field">
          <label>Piso / Depto</label>
          <input type="text" id="piso" placeholder="Ej: 3° B">
        </div>
        <div class="field">
          <label>Código postal <span class="req">*</span></label>
          <input type="text" id="cpDomicilio" placeholder="Ej: 1414">
        </div>
      </div>
      <div class="row2">
        <div class="field">
          <label>Localidad <span class="req">*</span></label>
          <input type="text" id="ciudadDomicilio" placeholder="Ej: Palermo">
        </div>
        <div class="field">
          <label>Provincia <span class="req">*</span></label>
          <input type="text" id="provinciaDomicilio" placeholder="Ej: Buenos Aires">
        </div>
      </div>
      <div class="field">
        <label>Indicaciones para el repartidor</label>
        <input type="text" id="indicaciones" placeholder="Ej: Timbre roto, llamar al llegar">
      </div>
    </div>

    <!-- PASO 3B: SUCURSAL -->
    <div class="card hidden" id="bloqueSucursal">
      <div class="card-title">Sucursal de retiro</div>
      <div class="field">
        <label>Provincia <span class="req">*</span></label>
        <div class="select-wrap">
          <select id="provincia" required>
            <option value="">— Seleccioná una provincia —</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Localidad <span class="req">*</span></label>
        <div class="select-wrap">
          <select id="localidad" disabled required>
            <option value="">— Primero elegí una provincia —</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>Sucursal <span class="req">*</span></label>
        <div class="select-wrap">
          <select id="sucursal" disabled required>
            <option value="">— Primero elegí una localidad —</option>
          </select>
        </div>
      </div>
      <div class="suc-info" id="sucInfo">
        <div class="suc-row"><span class="suc-lbl">📍 Dirección</span><span class="suc-val" id="sucDir"></span></div>
        <div class="suc-row"><span class="suc-lbl">📬 Cód. postal</span><span class="suc-val" id="sucCP"></span></div>
      </div>
    </div>

    <button type="submit" class="btn hidden" id="btnEnviar">Confirmar datos de envío</button>

  </form>

  <div class="success" id="successBox">
    <div class="suc-icon">✓</div>
    <h2>¡Recibimos tus datos!</h2>
    <p>Gracias, <strong id="sNombre"></strong>. Nos ponemos en contacto a la brevedad para coordinar el envío.</p>
    <div class="detalle" id="sDetalle"></div>
  </div>

</div>

let tipoEnvio = null;

function elegirTipo(tipo) {
  tipoEnvio = tipo;
  document.getElementById('btnDomicilio').classList.toggle('selected', tipo==='domicilio');
  document.getElementById('btnSucursal').classList.toggle('selected', tipo==='sucursal');

  document.getElementById('bloqueDatos').classList.remove('hidden');
  document.getElementById('bloqueDomicilio').classList.toggle('hidden', tipo!=='domicilio');
  document.getElementById('bloqueSucursal').classList.toggle('hidden', tipo!=='sucursal');
  document.getElementById('btnEnviar').classList.remove('hidden');

  document.getElementById('sd2').classList.add('active');
  document.getElementById('sl1').classList.add('done');
  document.getElementById('sd1').classList.add('done');
  document.getElementById('sd1').textContent = '✓';

  document.getElementById('bloqueDatos').scrollIntoView({behavior:'smooth', block:'nearest'});
}

const selProv = document.getElementById('provincia');
const selLoc  = document.getElementById('localidad');
const selSuc  = document.getElementById('sucursal');

const provs = [...new Set(DB.map(r=>r[0]))].sort();
provs.forEach(p => {
  const o = document.createElement('option');
  o.value = o.textContent = p;
  selProv.appendChild(o);
});

selProv.addEventListener('change', () => {
  const prov = selProv.value;
  selLoc.innerHTML = '<option value="">— Elegí una localidad —</option>';
  selSuc.innerHTML = '<option value="">— Primero elegí una localidad —</option>';
  selLoc.disabled = !prov;
  selSuc.disabled = true;
  document.getElementById('sucInfo').classList.remove('visible');
  if (!prov) return;
  [...new Set(DB.filter(r=>r[0]===prov).map(r=>r[1]))].sort().forEach(l => {
    const o = document.createElement('option');
    o.value = o.textContent = l;
    selLoc.appendChild(o);
  });
});

selLoc.addEventListener('change', () => {
  const prov = selProv.value, loc = selLoc.value;
  selSuc.innerHTML = '<option value="">— Elegí una sucursal —</option>';
  selSuc.disabled = !loc;
  document.getElementById('sucInfo').classList.remove('visible');
  if (!loc) return;
  DB.filter(r=>r[0]===prov&&r[1]===loc).map(r=>r[2]).sort().forEach(s => {
    const o = document.createElement('option');
    o.value = o.textContent = s;
    selSuc.appendChild(o);
  });
});

selSuc.addEventListener('change', () => {
  const dato = DB.find(r=>r[0]===selProv.value&&r[1]===selLoc.value&&r[2]===selSuc.value);
  if (dato) {
    document.getElementById('sucDir').textContent = dato[3];
    document.getElementById('sucCP').textContent  = dato[4];
    document.getElementById('sucInfo').classList.add('visible');
    document.getElementById('sd3').classList.add('active');
    document.getElementById('sl2').classList.add('done');
    document.getElementById('sd2').classList.add('done');
    document.getElementById('sd2').textContent = '✓';
  }
});

document.getElementById('form').addEventListener('submit', e => {
  e.preventDefault();
  const nombre   = document.getElementById('nombre').value.trim();
  const email    = document.getElementById('email').value.trim();
  const telefono = document.getElementById('telefono').value.trim();
  if (!tipoEnvio || !nombre || !email || !telefono) {
    alert('Completá todos los campos obligatorios (*)');
    return;
  }
  if (tipoEnvio==='domicilio') {
    const calle = document.getElementById('calle').value.trim();
    const cp    = document.getElementById('cpDomicilio').value.trim();
    const ciu   = document.getElementById('ciudadDomicilio').value.trim();
    const prov  = document.getElementById('provinciaDomicilio').value.trim();
    if (!calle||!cp||!ciu||!prov) { alert('Completá todos los campos de dirección (*)'); return; }
  } else {
    if (!selProv.value||!selLoc.value||!selSuc.value) {
      alert('Elegí provincia, localidad y sucursal'); return;
    }
  }

  const btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  let detalle = '';
  if (tipoEnvio==='domicilio') {
    const calle = document.getElementById('calle').value;
    const piso  = document.getElementById('piso').value;
    const cp    = document.getElementById('cpDomicilio').value;
    const ciu   = document.getElementById('ciudadDomicilio').value;
    const prov  = document.getElementById('provinciaDomicilio').value;
    const ind   = document.getElementById('indicaciones').value;
    detalle = `<strong>Tipo:</strong> Envío a domicilio<br><strong>Dirección:</strong> ${calle}${piso?' '+piso:''}<br><strong>Localidad:</strong> ${ciu}, ${prov} (${cp})${ind?'<br><strong>Indicaciones:</strong> '+ind:''}`;
  } else {
    const dir = document.getElementById('sucDir').textContent;
    const cp  = document.getElementById('sucCP').textContent;
    detalle = `<strong>Tipo:</strong> Retiro en sucursal<br><strong>Sucursal:</strong> ${selSuc.value}<br><strong>Localidad:</strong> ${selLoc.value}, ${selProv.value}<br><strong>Dirección:</strong> ${dir}<br><strong>Cód. postal:</strong> ${cp}`;
  }
  fetch("https://script.google.com/macros/s/AKfycby1SpIWCMIS62KXgEnAk7HwN3ogwnyFodJDY4-mGae-70pN9XU93_f-mLkUMK0xDRU/exec", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nombre: nombre,
      email: email,
      telefono: telefono,
      tipoEnvio: tipoEnvio,
      detalle: detalle
    })
  })
  .then(response => console.log("Guardado en Sheets"))
  .catch(error => console.error(error));
  document.getElementById('form').style.display = 'none';
  document.getElementById('sNombre').textContent = nombre;
  document.getElementById('sDetalle').innerHTML = detalle;
  document.getElementById('successBox').classList.add('visible');

  document.getElementById('sd3').classList.add('done');
  document.getElementById('sd3').textContent = '✓';
  document.getElementById('sl2').classList.add('done');
});
</script>
</body>
</html>
